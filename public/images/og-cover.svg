<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">xhverse cover image</title>
  <desc id="desc">Gradient cover image with abstract glow and depth.</desc>
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="52%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#cover)"/>
  <circle cx="840" cy="320" r="360" fill="url(#halo)"/>
  <rect x="0" y="620" width="1600" height="280" fill="#020617" fill-opacity="0.5"/>
</svg>
